<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{project-name}}</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 4rem auto; padding: 0 1rem; line-height: 1.6; }
    h1 { margin-bottom: 0.25rem; }
    code { background: #f4f4f4; padding: 0.15em 0.4em; border-radius: 3px; }
    pre code { display: block; padding: 1em; overflow-x: auto; }
  </style>
</head>
<body>
  <h1>{{project-name}}</h1>
  <p>{{description}}</p>

  <h2>Install</h2>
  <pre><code>cargo install {{project-name}}</code></pre>

  <p>Or download a binary from the
    <a href="https://github.com/{{gh-username}}/{{project-name}}/releases/latest">latest release</a>.
  </p>

  <footer>
    <p><a href="https://github.com/{{gh-username}}/{{project-name}}">GitHub</a></p>
  </footer>
</body>
</html>
