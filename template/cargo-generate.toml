[template]
cargo_generate_version = ">=0.10.0"
exclude = ["Justfile", "flake.nix", "rust-toolchain.toml", "clippy.toml", "rustfmt.toml", "tarpaulin.toml", ".envrc", ".gitignore", ".linecop.yaml"]
ignore = [".direnv", "flake.lock"]

[placeholders.gh-username]
type = "string"
prompt = "GitHub username or org?"

[placeholders.description]
type = "string"
prompt = "Project description?"
default = "A Rust project"

[placeholders.license]
type = "string"
prompt = "License?"
choices = ["MIT", "Apache-2.0", "MIT OR Apache-2.0", "GPL-3.0"]
default = "MIT"

# Conditional license file inclusion
[conditional.'license == "MIT"']
ignore = ["LICENSE-APACHE", "LICENSE-GPL"]

[conditional.'license == "Apache-2.0"']
ignore = ["LICENSE-MIT", "LICENSE-GPL"]

[conditional.'license == "MIT OR Apache-2.0"']
ignore = ["LICENSE-GPL"]

[conditional.'license == "GPL-3.0"']
ignore = ["LICENSE-MIT", "LICENSE-APACHE"]
